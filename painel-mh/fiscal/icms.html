<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cruzamento ICMS — MH Consultoria</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117; --bg2: #161b22; --border: rgba(255,255,255,0.08);
  --text1: #e8e6e0; --text2: #a0a0a0; --text3: #5a5a5a; --text4: #3a3a3a;
  --green: #1d9e75; --green-light: #5dcaa5; --green-bg: rgba(29,158,117,0.12);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }

.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0.85rem 2rem;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}
.btn-back {
  background: none; border: 0.5px solid var(--border);
  color: var(--text3); padding: 5px 12px; border-radius: 6px;
  font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  transition: color 0.2s, border-color 0.2s;
}
.btn-back:hover { color: var(--text1); border-color: rgba(255,255,255,0.25); }

.topbar-divider { color: var(--text4); font-size: 14px; }
.topbar-title { font-size: 13px; color: var(--text2); font-weight: 500; }
.topbar-sector {
  margin-left: auto;
  font-size: 10px; color: var(--text4);
  background: var(--green-bg); color: var(--green-light);
  padding: 3px 8px; border-radius: 20px;
  letter-spacing: 0.05em; text-transform: uppercase;
}

.main { max-width: 960px; margin: 0 auto; padding: 2rem; }

.tool-header { margin-bottom: 2rem; }
.tool-label { font-size: 10px; color: var(--text4); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.tool-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text1); }
.tool-desc { font-size: 13px; color: var(--text3); margin-top: 6px; line-height: 1.6; }

/* ---- COLE AQUI O CONTEÚDO DA SUA FERRAMENTA ICMS ---- */
.placeholder {
  background: var(--bg2);
  border: 0.5px dashed rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 3rem 2rem;
  text-align: center;
  color: var(--text4);
  font-size: 13px;
  line-height: 1.8;
}
.placeholder strong { color: var(--green-light); font-weight: 500; display: block; font-size: 14px; margin-bottom: 6px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="btn-back" href="../index.html">← Painel</a>
  <span class="topbar-divider">/</span>
  <span class="topbar-title">Cruzamento ICMS</span>
  <span class="topbar-sector">Fiscal</span>
</div>

<div class="main">
  <div class="tool-header">
    <div class="tool-label">Setor Fiscal</div>
    <div class="tool-title">Cruzamento ICMS</div>
    <div class="tool-desc">Leitura de arquivos CSV por filial e consolidação automática na aba TOTAL.</div>
  </div>

  <!-- ================================================
       COLE AQUI O CONTEÚDO ORIGINAL DA SUA FERRAMENTA
       O cabeçalho e o botão "Painel" já estão prontos.
       Basta substituir o bloco abaixo pelo seu HTML.
       ================================================ -->

  <div class="placeholder">
    <strong>Ferramenta ICMS</strong>
    Cole aqui o conteúdo original da sua ferramenta de cruzamento ICMS.<br>
    O cabeçalho com o botão "← Painel" já está configurado.
  </div>

</div>
</body>
</html>
